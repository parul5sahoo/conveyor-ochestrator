# GCP Agent Runtime Deployment Manifest
apiVersion: reasoningengine.cnrm.cloud.google.com/v1beta1
kind: ReasoningEngine
metadata:
  name: stackbox-conveyor-orchestrator
  namespace: warehouse-logistics
  labels:
    app: conveyor-orchestrator
    environment: production
spec:
  deployment:
    replicas: 3
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: "1"
        memory: 2Gi
  runtime_config:
    python_version: "3.12"
    entrypoint: "app:app"
    env:
      - name: GOOGLE_CLOUD_PROJECT
        value: "ce-testing-465204"
      - name: GOOGLE_CLOUD_LOCATION
        value: "us-central1"
      - name: MODEL_ARMOR_POLICY
        value: "/etc/model_armor/policy.yaml"
      - name: SPIFFE_ENDPOINT_SOCKET
        value: "unix:///var/run/spiffe-workload-api.sock"
